<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOURCE // Neues Werk erschaffen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sWhite: '#FAF9F6', sGreen: '#243D32', sBrown: '#3E2723', sTerra: '#C16E53' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Instrument Serif', 'serif'] },
                }
            }
        }
    </script>
</head>
<body class="bg-sWhite text-sBrown font-sans min-h-screen p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        <header class="mb-12 flex justify-between items-end border-b border-sBrown/10 pb-8">
            <div>
                <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-sTerra mb-2 block">Management</span>
                <h1 class="text-4xl font-serif italic text-sGreen">Neues Projekt</h1>
            </div>
            <a href="/dashboard" class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-40 hover:opacity-100 transition-all mb-2">← Abbrechen</a>
        </header>

        <form action="/submit-song" method="POST" enctype="multipart/form-data" class="space-y-12 bg-white p-8 md:p-16 rounded-[3.5rem] shadow-[0_20px_50px_rgba(36,61,50,0.05)] border border-sGreen/5">
            
            <div class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">Song Titel</label>
                        <input type="text" name="title" required placeholder="z.B. Midnight Echo" 
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all placeholder:text-sBrown/20 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">Künstler</label>
                        <input type="text" name="artist" required value="{{ user.username }}" 
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 border-y border-sGreen/5 py-8">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">Spotify Link</label>
                        <input type="url" name="spotify_url" required placeholder="open.spotify.com/track/..." 
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">ISRC Code (Tracking-ID)</label>
                        <input type="text" name="isrc" placeholder="z.B. DE-A12-23-45678" 
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all text-sm">
                        <p class="text-[9px] text-sBrown/30 mt-2 ml-1 italic lowercase">Eindeutige ID für exaktes Stream-Tracking via API</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">Stream-Ziel (Zahl)</label>
                        <input type="number" name="goal_streams" required placeholder="z.B. 10000" 
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-3">Genre / Stilistik</label>
                        <input list="genre-list" name="genre" id="genre-input" required placeholder="Suchen..."
                            class="w-full p-5 rounded-2xl bg-sGreen/[0.03] border-none focus:ring-2 focus:ring-sGreen/20 outline-none transition-all text-sm">
                        <datalist id="genre-list">
                            <option value="HipHop"><option value="Rap"><option value="Pop"><option value="Techno"><option value="Indie">
                        </datalist>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 pt-4">
                    <div class="group p-8 border-2 border-dashed border-sGreen/10 rounded-[2.5rem] bg-sGreen/[0.01] hover:bg-sGreen/[0.03] transition-all text-center">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-4">Cover Art</label>
                        <input type="file" name="cover" accept="image/*" required 
                            class="block w-full text-xs text-sBrown/40 file:mr-auto file:mb-0 file:block file:mx-auto file:py-2 file:px-6 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:uppercase file:bg-sGreen file:text-white cursor-pointer">
                    </div>
                    <div class="group p-8 border-2 border-dashed border-sGreen/10 rounded-[2.5rem] bg-sGreen/[0.01] hover:bg-sGreen/[0.03] transition-all text-center">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-sTerra mb-4">Belohnung (Video/Audio)</label>
                        <input type="file" name="reward_content" accept="video/*,audio/*" required 
                            class="block w-full text-xs text-sBrown/40 file:mr-auto file:mb-0 file:block file:mx-auto file:py-2 file:px-6 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:uppercase file:bg-sTerra file:text-white cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full py-8 bg-sGreen text-sWhite rounded-full font-bold uppercase tracking-[0.3em] text-[10px] shadow-2xl shadow-sGreen/20 hover:bg-sBrown hover:-translate-y-1 transition-all duration-700">
                Projekt im Archiv versiegeln
            </button>
        </form>

        <footer class="mt-16 text-center">
            <p class="text-[9px] text-sBrown/20 uppercase tracking-[0.6em]">Source Technology // Project I Was Here</p>
        </footer>
    </div>

</body>
</html>
